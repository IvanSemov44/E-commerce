services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: YourPassword123!
      POSTGRES_DB: ECommerceDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ECommerceDb"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  # Backend API
  api:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: ecommerce_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=ECommerceDb;Username=ecommerce;Password=YourPassword123!"
      Jwt__SecretKey: "your-super-secret-key-min-32-characters-long-must-be-used"
      Jwt__Issuer: "ecommerce-api"
      Jwt__Audience: "ecommerce-client"
      Jwt__ExpireMinutes: "60"
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:5000"
    ports:
      - "5000:5000"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Storefront
  frontend:
    build:
      context: ./src/frontend/storefront
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    depends_on:
      - api
    environment:
      VITE_API_URL: "http://api:5000/api"
    ports:
      - "5173:5173"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
