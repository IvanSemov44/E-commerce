services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ECommerceDb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce} -d ${POSTGRES_DB:-ECommerceDb}"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  # Backend API
  api:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: ecommerce_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=${POSTGRES_DB:-ECommerceDb};Username=${POSTGRES_USER:-ecommerce};Password=${POSTGRES_PASSWORD}"
      Jwt__SecretKey: "${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}"
      Jwt__Issuer: "ecommerce-api"
      Jwt__Audience: "ecommerce-client"
      Jwt__ExpireMinutes: "60"
      SendGrid__ApiKey: "${SENDGRID_API_KEY:-}"
      Smtp__Password: "${SMTP_PASSWORD:-}"
      PaymentWebhook__Secret: "${PAYMENT_WEBHOOK_SECRET:-}"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
      ASPNETCORE_URLS: "http://+:5000"
    ports:
      - "5000:5000"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Admin
  admin:
    build:
      context: ./src/frontend
      dockerfile: admin/Dockerfile
    container_name: ecommerce_admin
    depends_on:
      - api
    environment:
      VITE_API_URL: "http://localhost:5000/api"
    ports:
      - "3001:5177"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5177/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Storefront
  storefront:
    build:
      context: ./src/frontend/storefront
      dockerfile: Dockerfile
    container_name: ecommerce_storefront
    depends_on:
      - api
    environment:
      VITE_API_URL: "http://localhost:5000/api"
    ports:
      - "3000:5173"
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
