name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Security Scanning
  security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp, javascript
          
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Backend tests
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:alpine
        env:
          POSTGRES_DB: ECommerceTestDb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Restore dependencies
        run: dotnet restore src/backend/ECommerce.sln
      
      - name: Build
        run: dotnet build src/backend/ECommerce.sln --no-restore
      
      - name: Test
        run: dotnet test src/backend/ECommerce.Tests/ECommerce.Tests.csproj --no-restore --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: 'Host=localhost;Database=ECommerceTestDb;Username=test;Password=test'
          
      - name: Upload backend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            src/backend/ECommerce.Tests/TestResults/
            **/*.trx
          retention-days: 7

  # Frontend storefront build
  frontend-storefront-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/storefront/package-lock.json
      
      - name: Install dependencies
        working-directory: src/frontend/storefront
        run: npm ci
      
      - name: Build
        working-directory: src/frontend/storefront
        run: npm run build
        
      - name: Upload storefront build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storefront-build
          path: src/frontend/storefront/dist/
          retention-days: 7

  # Frontend storefront unit tests
  storefront-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/storefront/package-lock.json
      
      - name: Install dependencies
        working-directory: src/frontend/storefront
        run: npm ci
      
      - name: Run unit tests
        working-directory: src/frontend/storefront
        run: npm run test:run
        
      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storefront-unit-test-results
          path: src/frontend/storefront/coverage/
          retention-days: 7

  # Frontend storefront E2E tests
  storefront-e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests]
    services:
      postgres:
        image: postgres:alpine
        env:
          POSTGRES_DB: ECommerceTestDb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/storefront/package-lock.json
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Install frontend dependencies
        working-directory: src/frontend/storefront
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: src/frontend/storefront
        run: npx playwright install --with-deps
      
      - name: Restore backend dependencies
        run: dotnet restore src/backend/ECommerce.sln
      
      - name: Build backend
        run: dotnet build src/backend/ECommerce.sln --no-restore
      
      - name: Start backend API
        run: dotnet run --project src/backend/ECommerce.API/ECommerce.API.csproj --urls "http://localhost:5000" &
        env:
          ConnectionStrings__DefaultConnection: 'Host=localhost;Database=ECommerceTestDb;Username=test;Password=test'
          JwtSettings__SecretKey: 'e2e-test-secret-key-for-ci-pipeline-minimum-32-characters'
          JwtSettings__Issuer: 'ECommerce.API'
          JwtSettings__Audience: 'ECommerce.Client'
          ASPNETCORE_ENVIRONMENT: 'Development'
      
      - name: Wait for backend API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5000/health > /dev/null 2>&1; then
              echo "Backend API is ready"
              exit 0
            fi
            echo "Waiting for backend API... ($i/30)"
            sleep 2
          done
          echo "Backend API did not become ready in time"
          exit 1
      
      - name: Run E2E tests
        working-directory: src/frontend/storefront
        run: npm run test:e2e
        env:
          VITE_APP_URL: 'http://localhost:5173'
          VITE_API_URL: 'http://localhost:5000'
      
      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: storefront-e2e-test-results
          path: |
            src/frontend/storefront/playwright-report/
            src/frontend/storefront/test-results/
          retention-days: 7

  # Frontend admin build
  frontend-admin-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/admin/package-lock.json
      
      - name: Install dependencies
        working-directory: src/frontend/admin
        run: npm ci
      
      - name: Build
        working-directory: src/frontend/admin
        run: npm run build
        
      - name: Upload admin build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-build
          path: src/frontend/admin/dist/
          retention-days: 7

  # Frontend admin unit tests
  admin-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/admin/package-lock.json
      
      - name: Install dependencies
        working-directory: src/frontend/admin
        run: npm ci
      
      - name: Run unit tests
        working-directory: src/frontend/admin
        run: npm run test:run
        
      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: admin-unit-test-results
          path: src/frontend/admin/coverage/
          retention-days: 7

  # Build Docker images
  docker-build:
    needs: [backend-tests, frontend-storefront-build, storefront-unit-tests, storefront-e2e-tests, frontend-admin-build, admin-unit-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          push: false
          tags: ecommerce-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build Storefront Image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend/storefront
          push: false
          tags: ecommerce-storefront:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build Admin Image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend/admin
          push: false
          tags: ecommerce-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Staging deployment (manual trigger)
  # To enable staging deployment:
  # 1. Create a staging environment in GitHub repository settings
  # 2. Configure deployment secrets (e.g., STAGING_SERVER, STAGING_SSH_KEY)
  # 3. Uncomment this job and configure the deployment steps
